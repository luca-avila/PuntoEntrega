x-backend-image: &backend-image
  image: ${BACKEND_IMAGE_REF:-puntoentrega-backend:${BACKEND_IMAGE_TAG:-local}}

x-backend-env-file: &backend-env-file
  env_file:
    - ${BACKEND_ENV_FILE:-.env.backend}

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-.env.backend}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    <<: [*backend-image, *backend-env-file]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8000"

  worker:
    <<: [*backend-image, *backend-env-file]
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "worker.main"]
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
