services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: '["https://auth.luca-dev.online"]'
      FRONTEND_URL: ${FRONTEND_URL:-https://auth.luca-dev.online}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      VERIFY_PATH: ${VERIFY_PATH:-/verify-email}
      RESET_PASSWORD_PATH: ${RESET_PASSWORD_PATH:-/reset-password}
      DELIVERY_SUMMARY_RECIPIENTS: ${DELIVERY_SUMMARY_RECIPIENTS:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8000"

volumes:
  pgdata:
